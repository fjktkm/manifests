apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: root
  namespace: argocd
spec:
  description: Bootstrap project for this repository.
  sourceRepos:
    - https://github.com/fjktkm/manifests.git
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: workloads
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
